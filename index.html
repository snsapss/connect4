<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#0f1220;color:white;text-align:center;font-family:Arial}
#board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:20px}
.cell{aspect-ratio:1;border-radius:50%;background:#1e2240}
.p1{background:#ff4d4d}
.p2{background:#ffd24d}
button{padding:10px;margin:10px;font-size:16px}
</style>
</head>
<body>

<h3>7x4 Connect4 (Fixed)</h3>
<div id="board"></div>
<button onclick="reset()">Reset</button>

<script>
const R=4,C=7
let b=[]

function reset(){
 b=Array.from({length:R},()=>Array(C).fill(0))
 draw()
}

function draw(){
 board.innerHTML=""
 for(let r=0;r<R;r++)
 for(let c=0;c<C;c++){
  let d=document.createElement("div")
  d.className="cell"+(b[r][c]==1?" p1":b[r][c]==2?" p2":"")
  d.onclick=()=>move(c)
  board.appendChild(d)
 }
}

function drop(c,p,x=b){
 for(let r=R-1;r>=0;r--)
 if(!x[r][c]) return x[r][c]=p
}

function win(x,p){
 for(let r=0;r<R;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>x[r][c+i]==p)) return 1

 for(let c=0;c<C;c++)
 for(let r=0;r<R-3;r++)
 if([0,1,2,3].every(i=>x[r+i][c]==p)) return 1

 for(let r=0;r<R-3;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>x[r+i][c+i]==p)) return 1

 for(let r=3;r<R;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>x[r-i][c+i]==p)) return 1
 return 0
}

function copy(x){return x.map(r=>[...r])}

function moves(x){
 return [...Array(C).keys()].filter(c=>x[0][c]==0)
}

// ⚡ FIX: shallow + depth limited AI (no freeze)
function minimax(x,depth,max){
 if(win(x,2))return 10
 if(win(x,1))return -10
 if(depth==0)return 0

 let m=moves(x)
 if(!m.length)return 0

 if(max){
  let best=-999
  for(let c of m){
   let n=copy(x)
   drop(c,2,n)
   best=Math.max(best,minimax(n,depth-1,false))
  }
  return best
 }else{
  let best=999
  for(let c of m){
   let n=copy(x)
   drop(c,1,n)
   best=Math.min(best,minimax(n,depth-1,true))
  }
  return best
 }
}

function bestMove(){
 let m=moves(b)
 let best=-999,move=m[0]

 for(let c of m){
  let n=copy(b)
  drop(c,2,n)
  let score=minimax(n,5,false) // SAFE DEPTH = 5
  if(score>best){
   best=score
   move=c
  }
 }
 return move
}

function move(c){
 if(!drop(c,1))return
 if(win(b,1)){draw();alert("You win");return}

 let ai=bestMove()
 drop(ai,2)

 draw()
 if(win(b,2))alert("AI wins")
}

reset()
</script>

</body>
</html>
