<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#0f1220;color:white;text-align:center;font-family:Arial}
#board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:20px}
.cell{aspect-ratio:1;border-radius:50%;background:#1e2240}
.p1{background:#ff4d4d}
.p2{background:#ffd24d}
button{padding:10px;margin:10px;font-size:16px}
</style>
</head>
<body>

<h3>7x4 Connect4 Solver</h3>
<div id="board"></div>
<button onclick="reset()">Reset</button>

<script>
const R=4,C=7
let b=[]

function reset(){
 b=Array.from({length:R},()=>Array(C).fill(0))
 draw()
}

function draw(){
 board.innerHTML=""
 for(let r=0;r<R;r++)
  for(let c=0;c<C;c++){
   let d=document.createElement("div")
   d.className="cell"+(b[r][c]==1?" p1":b[r][c]==2?" p2":"")
   d.onclick=()=>move(c)
   board.appendChild(d)
  }
}

function drop(c,p,x=b){
 for(let r=R-1;r>=0;r--)
  if(!x[r][c]) return x[r][c]=p
}

function win(x,p){
 for(let r=0;r<R;r++)
 for(let c=0;c<C-3;c++)
  if([0,1,2,3].every(i=>x[r][c+i]==p)) return 1

 for(let c=0;c<C;c++)
 for(let r=0;r<R-3;r++)
  if([0,1,2,3].every(i=>x[r+i][c]==p)) return 1

 for(let r=0;r<R-3;r++)
 for(let c=0;c<C-3;c++)
  if([0,1,2,3].every(i=>x[r+i][c+i]==p)) return 1

 for(let r=3;r<R;r++)
 for(let c=0;c<C-3;c++)
  if([0,1,2,3].every(i=>x[r-i][c+i]==p)) return 1
}

function copy(x){return x.map(r=>[...r])}

function moves(x){return [...Array(C).keys()].filter(c=>!x[0][c])}

function mm(x,max,a,beta){
 if(win(x,2))return[0,1]
 if(win(x,1))return[0,-1]

 let m=moves(x)
 if(!m.length)return[0,0]

 let best=max?-9:9,bc=m[0]

 for(let c of m){
  let n=copy(x);drop(c,max?2:1,n)
  let s=mm(n,!max,a,beta)[1]

  if(max&&s>best){best=s;bc=c}
  if(!max&&s<best){best=s;bc=c}

  if(max)a=Math.max(a,s); else beta=Math.min(beta,s)
  if(beta<=a)break
 }

 return[bc,best]
}

function move(c){
 drop(c,1)
 if(win(b,1)){draw();alert("you win");return}

 let m=mm(b,1,-9,9)[0]
 drop(m,2)
 draw()

 if(win(b,2))alert("AI wins")
}

reset()
</script>

</body>
</html>
