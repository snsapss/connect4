<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connect4 AI Impossible</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.controls{ margin:10px; }

.board{
    display:grid;
    gap:6px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:60px;
    height:60px;
    background:#1e293b;
    border-radius:50%;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.piece{
    width:52px;
    height:52px;
    border-radius:50%;
    position:absolute;
    top:-70px;
    left:4px;
    animation: drop 0.25s forwards;
}

@keyframes drop{
    from{ top:-80px; }
    to{ top:4px; }
}

.red{background:red;}
.yellow{background:gold;}
</style>
</head>

<body>

<h1>Connect4 AI (Impossible Mode)</h1>

<div class="controls">
<button onclick="setBoard(4,7)">7x4</button>
<button onclick="setBoard(5,7)">7x5</button>
<button onclick="restart()">Restart</button>
</div>

<div id="board" class="board"></div>

<script>
class Connect4AI {
    constructor(r,c){
        this.R=r;
        this.C=c;
        this.board=Array.from({length:r},()=>Array(c).fill(0));
        this.tt=new Map(); // transposition table
    }

    moves(){
        let m=[];
        for(let c=0;c<this.C;c++)
            if(this.board[0][c]==0) m.push(c);
        return m;
    }

    drop(c,p){
        for(let r=this.R-1;r>=0;r--){
            if(this.board[r][c]==0){
                this.board[r][c]=p;
                return r;
            }
        }
        return -1;
    }

    undo(c){
        for(let r=0;r<this.R;r++){
            if(this.board[r][c]!=0){
                this.board[r][c]=0;
                break;
            }
        }
    }

    key(){
        return this.board.flat().join("");
    }

    win(p){
        let b=this.board,R=this.R,C=this.C;

        for(let r=0;r<R;r++){
            for(let c=0;c<C;c++){
                if(b[r][c]!=p) continue;

                if(c+3<C &&
                b[r][c+1]==p&&b[r][c+2]==p&&b[r][c+3]==p) return true;

                if(r+3<R &&
                b[r+1][c]==p&&b[r+2][c]==p&&b[r+3][c]==p) return true;

                if(r+3<R&&c+3<C &&
                b[r+1][c+1]==p&&b[r+2][c+2]==p&&b[r+3][c+3]==p) return true;

                if(r+3<R&&c-3>=0 &&
                b[r+1][c-1]==p&&b[r+2][c-2]==p&&b[r+3][c-3]==p) return true;
            }
        }
        return false;
    }

    // ⚡ strong evaluation
    score(){
        let s=0;
        let center=Math.floor(this.C/2);

        for(let r=0;r<this.R;r++){
            if(this.board[r][center]==2) s+=10;
        }

        s += this.evalPlayer(2)*1.2;
        s -= this.evalPlayer(1)*1.4;

        return s;
    }

    evalPlayer(p){
        let b=this.board,R=this.R,C=this.C;
        let score=0;

        const check=(a)=>{
            let pc=a.filter(x=>x==p).length;
            let empty=a.filter(x=>x==0).length;

            if(pc==4) return 100000;
            if(pc==3 && empty==1) return 120;
            if(pc==2 && empty==2) return 20;
            return 0;
        };

        for(let r=0;r<R;r++){
            for(let c=0;c<C-3;c++)
                score+=check([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]]);
        }

        for(let r=0;r<R-3;r++){
            for(let c=0;c<C;c++)
                score+=check([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]]);
        }

        for(let r=0;r<R-3;r++){
            for(let c=0;c<C-3;c++)
                score+=check([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]]);
        }

        for(let r=0;r<R-3;r++){
            for(let c=3;c<C;c++)
                score+=check([b[r][c],b[r+1][c-1],b[r+2][c-2],b[r+3][c-3]]);
        }

        return score;
    }

    orderMoves(){
        let center=Math.floor(this.C/2);
        return this.moves().sort((a,b)=>{
            return Math.abs(center-a)-Math.abs(center-b);
        });
    }

    minimax(depth,alpha,beta,max){
        let k=this.key()+"_"+depth+"_"+max;
        if(this.tt.has(k)) return this.tt.get(k);

        if(this.win(2)) return 99999;
        if(this.win(1)) return -99999;
        if(depth==0) return this.score();

        let moves=this.orderMoves();

        let best = max ? -Infinity : Infinity;

        for(let c of moves){
            this.drop(c,max?2:1);
            let val=this.minimax(depth-1,alpha,beta,!max);
            this.undo(c);

            if(max){
                best=Math.max(best,val);
                alpha=Math.max(alpha,best);
            } else {
                best=Math.min(best,val);
                beta=Math.min(beta,best);
            }

            if(beta<=alpha) break;
        }

        this.tt.set(k,best);
        return best;
    }

    // ⏱ iterative deepening
    bestMove(timeLimit=600){
        let start=Date.now();
        let moves=this.orderMoves();

        let bestMove=moves[0];

        for(let depth=1; depth<=7; depth++){
            let best=-Infinity;

            for(let c of moves){

                if(Date.now()-start>timeLimit)
                    return bestMove;

                this.drop(c,2);
                let val=this.minimax(depth,-Infinity,Infinity,false);
                this.undo(c);

                if(val>best){
                    best=val;
                    bestMove=c;
                }
            }
        }

        return bestMove;
    }
}

let game;
let turn=1;

function setBoard(r,c){
    game=new Connect4AI(r,c);
    createBoard();
    render();
    turn=1;
}

function createBoard(){
    let board=document.getElementById("board");
    board.innerHTML="";
    board.style.gridTemplateColumns=`repeat(${game.C},60px)`;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.onclick=()=>play(c);
            board.appendChild(cell);
        }
    }
}

function render(){
    let cells=document.querySelectorAll(".cell");
    let i=0;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            cells[i].innerHTML="";
            if(game.board[r][c]!=0){
                let p=document.createElement("div");
                p.className="piece "+(game.board[r][c]==1?"red":"yellow");
                cells[i].appendChild(p);
            }
            i++;
        }
    }
}

function play(c){
    if(turn!=1) return;

    game.drop(c,1);
    render();

    if(game.win(1)) return alert("You win!");

    turn=2;

    setTimeout(()=>{
        let ai=game.bestMove();
        game.drop(ai,2);
        render();

        if(game.win(2)) alert("AI wins!");

        turn=1;
    },80);
}

function restart(){
    setBoard(game.R,game.C);
}

// default
setBoard(4,7);
</script>

</body>
</html>
