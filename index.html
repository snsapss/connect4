<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connect4 AI Ultra</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.controls{
    padding:10px;
}

.board{
    display:grid;
    gap:6px;
    justify-content:center;
    margin:auto;
    margin-top:20px;
    touch-action:none;
}

.cell{
    width:clamp(35px,10vw,60px);
    height:clamp(35px,10vw,60px);
    background:#1e293b;
    border-radius:50%;
    position:relative;
}

.piece{
    width:90%;
    height:90%;
    border-radius:50%;
    position:absolute;
    top:5%;
    left:5%;
    animation:drop .18s ease-out;
}

@keyframes drop{
    from{ transform:translateY(-80px); }
    to{ transform:translateY(0); }
}

.red{background:red;}
.yellow{background:gold;}

#ghost{
    position:fixed;
    width:50px;
    height:50px;
    border-radius:50%;
    pointer-events:none;
    opacity:0.7;
    display:none;
}
</style>
</head>

<body>

<h2>Connect4 AI Ultra</h2>

<div class="controls">
<button onclick="setBoard(4,7)">7x4</button>
<button onclick="setBoard(5,7)">7x5</button>
<button onclick="restart()">Restart</button>
</div>

<div id="board" class="board"></div>
<div id="ghost" class="red"></div>

<script>

/* ---------------- SOUND ---------------- */
const audio = {
    ctx: null,
    beep(freq){
        if(!this.ctx) this.ctx = new AudioContext();
        let o = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        o.frequency.value = freq;
        o.connect(g);
        g.connect(this.ctx.destination);
        g.gain.value = 0.05;
        o.start();
        setTimeout(()=>o.stop(),80);
    },
    drop(){ this.beep(220); },
    ai(){ this.beep(160); },
    win(){ this.beep(520); }
};

/* ---------------- AI ENGINE ---------------- */
class Connect4AI {
    constructor(r,c){
        this.R=r;
        this.C=c;
        this.board=Array.from({length:r},()=>Array(c).fill(0));
        this.tt=new Map();
    }

    moves(){
        let m=[];
        for(let c=0;c<this.C;c++)
            if(this.board[0][c]==0) m.push(c);
        return m;
    }

    drop(c,p){
        for(let r=this.R-1;r>=0;r--){
            if(this.board[r][c]==0){
                this.board[r][c]=p;
                return r;
            }
        }
    }

    undo(c){
        for(let r=0;r<this.R;r++){
            if(this.board[r][c]!=0){
                this.board[r][c]=0;
                break;
            }
        }
    }

    key(){
        return this.board.flat().join("");
    }

    win(p){
        let b=this.board,R=this.R,C=this.C;

        for(let r=0;r<R;r++){
            for(let c=0;c<C;c++){
                if(b[r][c]!=p) continue;

                if(c+3<C &&
                b[r][c+1]==p&&b[r][c+2]==p&&b[r][c+3]==p) return true;

                if(r+3<R &&
                b[r+1][c]==p&&b[r+2][c]==p&&b[r+3][c]==p) return true;

                if(r+3<R&&c+3<C &&
                b[r+1][c+1]==p&&b[r+2][c+2]==p&&b[r+3][c+3]==p) return true;

                if(r+3<R&&c-3>=0 &&
                b[r+1][c-1]==p&&b[r+2][c-2]==p&&b[r+3][c-3]==p) return true;
            }
        }
        return false;
    }

    /* 🔥 FORCED WIN DETECTION (2–4 ply threat scan) */
    forcedWin(p,depth=4){
        if(depth==0) return false;
        if(this.win(p)) return true;

        for(let c of this.moves()){
            this.drop(c,p);
            let res=this.forcedWin(p,depth-1);
            this.undo(c);
            if(res) return true;
        }
        return false;
    }

    score(){
        let s=0;
        let center=Math.floor(this.C/2);

        for(let r=0;r<this.R;r++){
            if(this.board[r][center]==2) s+=10;
        }

        return s;
    }

    order(){
        let center=Math.floor(this.C/2);
        return this.moves().sort((a,b)=>Math.abs(center-a)-Math.abs(center-b));
    }

    minimax(depth,alpha,beta,max){
        let k=this.key()+"_"+depth+"_"+max;
        if(this.tt.has(k)) return this.tt.get(k);

        if(this.win(2)) return 99999;
        if(this.win(1)) return -99999;
        if(depth==0) return this.score();

        let best = max ? -Infinity : Infinity;

        for(let c of this.order()){
            this.drop(c,max?2:1);
            let val=this.minimax(depth-1,alpha,beta,!max);
            this.undo(c);

            if(max){
                best=Math.max(best,val);
                alpha=Math.max(alpha,best);
            } else {
                best=Math.min(best,val);
                beta=Math.min(beta,best);
            }

            if(beta<=alpha) break;
        }

        this.tt.set(k,best);
        return best;
    }

    bestMove(){
        let moves=this.order();

        /* ⚡ instant win */
        for(let c of moves){
            this.drop(c,2);
            if(this.win(2)){ this.undo(c); return c; }
            this.undo(c);
        }

        /* 💀 block opponent win */
        for(let c of moves){
            this.drop(c,1);
            if(this.win(1)){ this.undo(c); return c; }
            this.undo(c);
        }

        let best=-Infinity,move=moves[0];

        for(let c of moves){
            this.drop(c,2);

            let lose=this.forcedWin(1,3); // anti-fork logic
            let val=this.minimax(6,-Infinity,Infinity,false);

            this.undo(c);

            if(!lose && val>best){
                best=val;
                move=c;
            }
        }

        return move;
    }
}

/* ---------------- GAME ---------------- */
let game;
let turn=1;
let dragging=false;

function setBoard(r,c){
    game=new Connect4AI(r,c);
    build();
    render();
    turn=1;
}

function build(){
    let b=document.getElementById("board");
    b.innerHTML="";
    b.style.gridTemplateColumns=`repeat(${game.C},1fr)`;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.c=c;

            cell.ondragover=e=>e.preventDefault();
            cell.ondrop=e=>{
                e.preventDefault();
                play(c);
            };

            cell.onclick=()=>play(c);

            b.appendChild(cell);
        }
    }
}

function render(){
    let cells=document.querySelectorAll(".cell");
    let i=0;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            cells[i].innerHTML="";
            if(game.board[r][c]){
                let p=document.createElement("div");
                p.className="piece "+(game.board[r][c]==1?"red":"yellow");
                cells[i].appendChild(p);
            }
            i++;
        }
    }
}

function play(c){
    if(turn!=1) return;

    game.drop(c,1);
    audio.drop();
    render();

    if(game.win(1)){
        audio.win();
        return alert("You win!");
    }

    turn=2;

    setTimeout(()=>{
        let ai=game.bestMove();
        game.drop(ai,2);
        audio.ai();
        render();

        if(game.win(2)){
            audio.win();
            alert("AI wins!");
        }

        turn=1;
    },60);
}

function restart(){
    setBoard(game.R,game.C);
}

/* start */
setBoard(4,7);
</script>

</body>
</html>
