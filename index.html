<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connect4 AI - Fixed + Strong</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:radial-gradient(circle,#0f172a,#020617);
    color:white;
    text-align:center;
}

h1{ margin-top:18px; }

.panel{
    margin:10px;
    display:inline-block;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{ background:#1d4ed8; }

.board{
    display:grid;
    gap:10px;
    justify-content:center;
    margin:25px auto;
    padding:20px;
    background:rgba(255,255,255,0.03);
    border-radius:18px;
    width:max-content;
}

.cell{
    width:70px;
    height:70px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    cursor:pointer;
    position:relative;
}

.piece{
    width:62px;
    height:62px;
    border-radius:50%;
    position:absolute;
    top:4px;
    left:4px;
    animation:drop .18s ease-out;
}

@keyframes drop{
    from{ transform:translateY(-90px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
}

.red{ background:radial-gradient(circle,#ff6b6b,#b91c1c); }
.yellow{ background:radial-gradient(circle,#fde047,#ca8a04); }
</style>
</head>

<body>

<h1>💀 Connect4 AI (Near-Unbeatable 7x4)</h1>

<div class="panel">
<button onclick="setBoard(4,7)">7x4</button>
<button onclick="setBoard(5,7)">7x5</button>
<br>
<button onclick="restart('player')">👤 Player Starts</button>
<button onclick="restart('ai')">🤖 AI Starts</button>
</div>

<div id="board" class="board"></div>

<script>

class Connect4AI {
    constructor(r,c){
        this.R=r;
        this.C=c;
        this.board=Array.from({length:r},()=>Array(c).fill(0));
    }

    moves(){
        let m=[];
        for(let c=0;c<this.C;c++)
            if(this.board[0][c]==0) m.push(c);
        return m;
    }

    drop(c,p){
        for(let r=this.R-1;r>=0;r--){
            if(this.board[r][c]==0){
                this.board[r][c]=p;
                return;
            }
        }
    }

    undo(c){
        for(let r=0;r<this.R;r++){
            if(this.board[r][c]){
                this.board[r][c]=0;
                break;
            }
        }
    }

    win(p){
        let b=this.board,R=this.R,C=this.C;

        for(let r=0;r<R;r++){
            for(let c=0;c<C;c++){
                if(b[r][c]!=p) continue;

                if(c+3<C &&
                b[r][c+1]==p&&b[r][c+2]==p&&b[r][c+3]==p) return true;

                if(r+3<R &&
                b[r+1][c]==p&&b[r+2][c]==p&&b[r+3][c]==p) return true;

                if(r+3<R&&c+3<C &&
                b[r+1][c+1]==p&&b[r+2][c+2]==p&&b[r+3][c+3]==p) return true;

                if(r+3<R&&c-3>=0 &&
                b[r+1][c-1]==p&&b[r+2][c-2]==p&&b[r+3][c-3]==p) return true;
            }
        }
        return false;
    }

    score(){
        let s=0;
        let center=Math.floor(this.C/2);

        for(let r=0;r<this.R;r++)
            if(this.board[r][center]==2) s+=12;

        return s;
    }

    order(){
        let center=Math.floor(this.C/2);
        return this.moves().sort((a,b)=>Math.abs(center-a)-Math.abs(center-b));
    }

    /* 💀 FORCED WIN DETECTION */
    forcedWin(p,depth){
        if(depth==0) return false;
        if(this.win(p)) return true;

        for(let c of this.moves()){
            this.drop(c,p);
            let res=this.forcedWin(p,depth-1);
            this.undo(c);
            if(res) return true;
        }
        return false;
    }

    minimax(depth,alpha,beta,max){
        if(this.win(2)) return 999999;
        if(this.win(1)) return -999999;
        if(depth==0) return this.score();

        let best=max?-Infinity:Infinity;

        for(let c of this.order()){
            this.drop(c,max?2:1);
            let val=this.minimax(depth-1,alpha,beta,!max);
            this.undo(c);

            if(max){
                best=Math.max(best,val);
                alpha=Math.max(alpha,best);
            } else {
                best=Math.min(best,val);
                beta=Math.min(beta,best);
            }

            if(beta<=alpha) break;
        }

        return best;
    }

    bestMove(){
        let moves=this.order();

        /* ⚡ instant win */
        for(let c of moves){
            this.drop(c,2);
            if(this.win(2)){ this.undo(c); return c; }
            this.undo(c);
        }

        /* ❌ block opponent win */
        for(let c of moves){
            this.drop(c,1);
            if(this.win(1)){ this.undo(c); return c; }
            this.undo(c);
        }

        let best=-Infinity,move=moves[0];

        for(let c of moves){
            this.drop(c,2);

            let trap=this.forcedWin(1,3); // anti fork
            let val=this.minimax(7,-Infinity,Infinity,false);

            this.undo(c);

            if(!trap && val>best){
                best=val;
                move=c;
            }
        }

        return move;
    }
}

/* GAME STATE FIXED */
let game;
let turn=1;
let mode="player";

function setBoard(r,c){
    game=new Connect4AI(r,c);
    build();
    render();
    turn=1;

    if(mode==="ai"){
        setTimeout(aiTurn,300);
    }
}

function restart(start="player"){
    mode=start;
    setBoard(game.R,game.C);
}

function build(){
    let b=document.getElementById("board");
    b.innerHTML="";
    b.style.gridTemplateColumns=`repeat(${game.C},70px)`;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.onclick=()=>play(c);
            b.appendChild(cell);
        }
    }
}

function render(){
    let cells=document.querySelectorAll(".cell");
    let i=0;

    for(let r=0;r<game.R;r++){
        for(let c=0;c<game.C;c++){
            cells[i].innerHTML="";
            if(game.board[r][c]){
                let p=document.createElement("div");
                p.className="piece "+(game.board[r][c]==1?"red":"yellow");
                cells[i].appendChild(p);
            }
            i++;
        }
    }
}

function play(c){
    if(turn!=1) return;

    game.drop(c,1);
    render();

    if(game.win(1)) return alert("You win!");

    turn=2;
    setTimeout(aiTurn,60);
}

function aiTurn(){
    let move=game.bestMove();
    game.drop(move,2);
    render();

    if(game.win(2)) alert("AI wins!");

    turn=1;
}

/* START */
setBoard(4,7);
</script>

</body>
</html>
