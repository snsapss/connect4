<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>7x4 Tablebase Engine</title>
<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
.board{
    display:grid;
    gap:6px;
    justify-content:center;
    margin-top:20px;
}
.cell{
    width:60px;height:60px;
    background:#1e293b;
    border-radius:50%;
    cursor:pointer;
    position:relative;
}
.piece{
    width:52px;height:52px;
    border-radius:50%;
    position:absolute;
    top:4px;left:4px;
}
.red{background:red;}
.yellow{background:gold;}
</style>
</head>
<body>

<h1>💀 7x4 FULL SOLVER (Self-Build Tablebase)</h1>
<button onclick="startBuild()">🧠 Build Tablebase (first run)</button>
<button onclick="restart()">Restart</button>

<div id="status">Not built</div>
<div id="board" class="board"></div>

<script>
class Engine {
    constructor(r,c){
        this.R=r;
        this.C=c;
        this.board=Array.from({length:r},()=>Array(c).fill(0));

        // 💀 REAL TABLEBASE STORAGE
        this.db = new Map();
    }

    moves(){
        let m=[];
        for(let c=0;c<this.C;c++)
            if(this.board[0][c]==0) m.push(c);
        return m;
    }

    drop(c,p){
        for(let r=this.R-1;r>=0;r--){
            if(this.board[r][c]==0){
                this.board[r][c]=p;
                return;
            }
        }
    }

    undo(c){
        for(let r=0;r<this.R;r++){
            if(this.board[r][c]){
                this.board[r][c]=0;
                break;
            }
        }
    }

    win(p){
        let b=this.board,R=this.R,C=this.C;

        for(let r=0;r<R;r++){
            for(let c=0;c<C;c++){
                if(b[r][c]!=p) continue;

                if(c+3<C &&
                b[r][c+1]==p&&b[r][c+2]==p&&b[r][c+3]==p) return true;

                if(r+3<R &&
                b[r+1][c]==p&&b[r+2][c]==p&&b[r+3][c]==p) return true;

                if(r+3<R&&c+3<C &&
                b[r+1][c+1]==p&&b[r+2][c+2]==p&&b[r+3][c+3]==p) return true;

                if(r+3<R&&c-3>=0 &&
                b[r+1][c-1]==p&&b[r+2][c-2]==p&&b[r+3][c-3]==p) return true;
            }
        }
        return false;
    }

    key(){
        return this.board.flat().join("");
    }

    // 💀 RETROGRADE TABLEBASE BUILDER
    solve(maximizing){
        let k=this.key()+"_"+maximizing;

        if(this.db.has(k)) return this.db.get(k);

        if(this.win(2)) return 1;
        if(this.win(1)) return -1;

        let moves=this.moves();
        if(moves.length==0) return 0;

        let best=maximizing?-2:2;

        for(let c of moves){
            this.drop(c,maximizing?2:1);

            let val=this.solve(!maximizing);

            this.undo(c);

            if(maximizing){
                best=Math.max(best,val);
                if(best==1) break;
            }else{
                best=Math.min(best,val);
                if(best==-1) break;
            }
        }

        this.db.set(k,best);
        return best;
    }

    bestMove(){
        let moves=this.moves();
        let best=-2,move=moves[0];

        for(let c of moves){
            this.drop(c,2);
            let val=this.solve(false);
            this.undo(c);

            if(val>best){
                best=val;
                move=c;
            }
        }
        return move;
    }
}

let game = new Engine(4,7);
let built=false;

/* 🔥 BUILD FULL TABLEBASE */
function startBuild(){
    document.getElementById("status").innerText="🧠 Building tablebase... (first run may lag)";

    setTimeout(()=>{
        game.solve(true);
        built=true;
        document.getElementById("status").innerText="💀 READY - Perfect Play Active";
        buildBoard();
        render();
    },50);
}

function buildBoard(){
    let b=document.getElementById("board");
    b.innerHTML="";
    b.style.gridTemplateColumns="repeat(7,60px)";

    for(let r=0;r<4;r++){
        for(let c=0;c<7;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            cell.onclick=()=>play(c);
            b.appendChild(cell);
        }
    }
}

function render(){
    let cells=document.querySelectorAll(".cell");
    let i=0;

    for(let r=0;r<4;r++){
        for(let c=0;c<7;c++){
            cells[i].innerHTML="";
            if(game.board[r][c]){
                let p=document.createElement("div");
                p.className="piece "+(game.board[r][c]==1?"red":"yellow");
                cells[i].appendChild(p);
            }
            i++;
        }
    }
}

function play(c){
    if(!built) return alert("Build tablebase first!");

    game.drop(c,1);
    render();

    if(game.win(1)) return alert("You win!");

    setTimeout(()=>{
        let ai=game.bestMove();
        game.drop(ai,2);
        render();

        if(game.win(2)) alert("AI wins!");
    },50);
}

function restart(){
    game = new Engine(4,7);
    built=false;
    document.getElementById("status").innerText="Not built";
    buildBoard();
    render();
}

buildBoard();
render();
</script>

</body>
</html>
