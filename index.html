<script>
let R=4
const C=7
let b=[]
let game=false
let cache=new Map()

function setStatus(t){status.innerText=t}

function reset(){
R=parseInt(mode.value)
b=Array.from({length:R},()=>Array(C).fill(0))
game=true
cache.clear()

board.style.gridTemplateColumns=`repeat(${C},52px)`
draw()

setStatus("Your turn")

if(starter.value==="ai"){
setStatus("AI thinking...")
setTimeout(aiMove,200)
}
}

function draw(){
board.innerHTML=""
for(let r=0;r<R;r++)
for(let c=0;c<C;c++){
let d=document.createElement("div")
d.className="cell"
if(b[r][c]==1)d.classList.add("p1")
if(b[r][c]==2)d.classList.add("p2")
d.onclick=()=>play(c)
board.appendChild(d)
}
}

function drop(col,p,board=b){
for(let r=R-1;r>=0;r--)
if(board[r][col]==0){
board[r][col]=p
return true
}
return false
}

function win(board,p){
for(let r=0;r<R;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>board[r][c+i]==p))return true

for(let c=0;c<C;c++)
for(let r=0;r<R-3;r++)
if([0,1,2,3].every(i=>board[r+i][c]==p))return true

for(let r=0;r<R-3;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>board[r+i][c+i]==p))return true

for(let r=3;r<R;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>board[r-i][c+i]==p))return true

return false
}

function copy(x){return x.map(r=>[...r])}

function key(board){
return board.flat().join("")
}

function moves(board){
return [3,2,4,1,5,0,6].filter(c=>board[0][c]==0)
}

function minimax(board,player){

let k=key(board)
if(cache.has(k))return cache.get(k)

if(win(board,2))return 1
if(win(board,1))return -1

let m=moves(board)
if(m.length==0)return 0

let best = player==2 ? -2 : 2

for(let c of m){
let nb=copy(board)
drop(c,player,nb)

let score=minimax(nb,player==2?1:2)

if(player==2){
best=Math.max(best,score)
if(best==1)break
}else{
best=Math.min(best,score)
if(best==-1)break
}
}

cache.set(k,best)
return best
}

function bestMove(){
let m=moves(b)
let best=-2
let move=m[0]

for(let c of m){
let nb=copy(b)
drop(c,2,nb)

let score=minimax(nb,1)

if(score>best){
best=score
move=c
}
}

return move
}

function play(c){
if(!game)return
if(!drop(c,1))return

if(win(b,1)){
draw()
setStatus("You win 🎉")
game=false
return
}

setStatus("AI thinking...")
setTimeout(aiMove,50)
}

function aiMove(){
if(!game)return

let c=bestMove()
drop(c,2)

draw()

if(win(b,2)){
setStatus("AI wins 🤖")
game=false
}else{
setStatus("Your turn")
}
}

reset()
</script>
