<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect4 7x4 Solver</title>

<style>
body{
  margin:0;
  background:#0f1220;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* container like chess.com board area */
#container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

/* smaller centered board */
#board{
  display:grid;
  grid-template-columns:repeat(7,55px);
  gap:6px;
  padding:12px;
  background:#151a33;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.cell{
  width:55px;
  height:55px;
  border-radius:50%;
  background:#22284a;
  cursor:pointer;
  transition:0.15s;
}

.cell:hover{
  transform:scale(1.05);
}

.p1{ background:#ff4d4d; }
.p2{ background:#ffd24d; }

button, select{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2a3160;
  color:white;
  font-size:14px;
  cursor:pointer;
}

button:hover{
  background:#3a4380;
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
}
</style>
</head>

<body>

<div id="container">

  <h2>Connect4 7×4 Solver</h2>

  <div class="controls">
    <select id="starter">
      <option value="player">You start</option>
      <option value="ai">AI starts</option>
    </select>
    <button onclick="reset()">Start Game</button>
  </div>

  <div id="board"></div>

</div>

<script>
const R=4,C=7
let b=[],gameOver=false

function create(){
 b=Array.from({length:R},()=>Array(C).fill(0))
 gameOver=false
 draw()

 if(document.getElementById("starter").value==="ai"){
  aiMove()
 }
}

function draw(){
 board.innerHTML=""
 for(let r=0;r<R;r++){
  for(let c=0;c<C;c++){
   let d=document.createElement("div")
   d.className="cell"
   if(b[r][c]==1) d.classList.add("p1")
   if(b[r][c]==2) d.classList.add("p2")
   d.onclick=()=>move(c)
   board.appendChild(d)
  }
 }
}

function drop(col,p){
 for(let r=R-1;r>=0;r--){
  if(b[r][col]==0){
   b[r][col]=p
   return true
  }
 }
 return false
}

function win(p){
 for(let r=0;r<R;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>b[r][c+i]==p)) return true

 for(let c=0;c<C;c++)
 for(let r=0;r<R-3;r++)
 if([0,1,2,3].every(i=>b[r+i][c]==p)) return true

 for(let r=0;r<R-3;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>b[r+i][c+i]==p)) return true

 for(let r=3;r<R;r++)
 for(let c=0;c<C-3;c++)
 if([0,1,2,3].every(i=>b[r-i][c+i]==p)) return true

 return false
}

function copy(x){return x.map(r=>[...r])}

function moves(){
 return [...Array(C).keys()].filter(c=>b[0][c]==0)
}

/* simple but strong AI (fast, no freeze) */
function scoreBoard(){
 if(win(2))return 100
 if(win(1))return -100
 return 0
}

function minimax(depth,alpha,beta,max){
 if(depth==0||win(1)||win(2)) return scoreBoard()

 let m=moves()

 if(max){
  let best=-999
  for(let c of m){
   let nb=copy(b)
   dropTemp(nb,c,2)
   let val=mini(nb,depth-1,false,alpha,beta)
   best=Math.max(best,val)
   alpha=Math.max(alpha,val)
   if(beta<=alpha)break
  }
  return best
 }else{
  let best=999
  for(let c of m){
   let nb=copy(b)
   dropTemp(nb,c,1)
   let val=mini(nb,depth-1,true,alpha,beta)
   best=Math.min(best,val)
   beta=Math.min(beta,val)
   if(beta<=alpha)break
  }
  return best
 }
}

function mini(board,depth,max,alpha,beta){
 b=board
 return minimax(depth,alpha,beta,max)
}

function dropTemp(board,col,p){
 for(let r=R-1;r>=0;r--){
  if(board[r][col]==0){
   board[r][col]=p
   return
  }
 }
}

function aiBest(){
 let m=moves()
 let best=-999,move=m[0]

 for(let c of m){
  let nb=copy(b)
  dropTemp(nb,c,2)
  let val=mini(nb,4,false,-999,999)

  if(val>best){
   best=val
   move=c
  }
 }
 return move
}

function move(c){
 if(gameOver) return
 if(!drop(c,1)) return

 if(win(1)){
  draw()
  alert("You win")
  gameOver=true
  return
 }

 aiMove()
}

function aiMove(){
 if(gameOver) return

 let c=aiBest()
 drop(c,2)
 draw()

 if(win(2)){
  alert("AI wins")
  gameOver=true
 }
}

function reset(){
 create()
}

create()
</script>

</body>
</html>
