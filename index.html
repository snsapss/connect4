<script>
const C=7
let R=4
let board=[]
let game=true

const MAX_TIME = 120   // ms thinking time (safe)
let startTime

const boardEl=document.getElementById("board")
const statusEl=document.getElementById("status")
const modeEl=document.getElementById("mode")
const starterEl=document.getElementById("starter")

function setStatus(t){statusEl.innerText=t}

function reset(){
R=parseInt(modeEl.value)
board=Array.from({length:R},()=>Array(C).fill(0))
game=true

boardEl.style.gridTemplateColumns=`repeat(${C},52px)`

draw()

setStatus("Your turn")

if(starterEl.value==="ai"){
setStatus("AI thinking...")
setTimeout(aiMove,100)
}
}

function draw(){
boardEl.innerHTML=""

for(let r=0;r<R;r++)
for(let c=0;c<C;c++){
let d=document.createElement("div")
d.className="cell"
if(board[r][c]==1)d.classList.add("p1")
if(board[r][c]==2)d.classList.add("p2")
d.onclick=()=>play(c)
boardEl.appendChild(d)
}
}

function drop(col,p,b=board){
for(let r=R-1;r>=0;r--)
if(b[r][col]==0){ b[r][col]=p; return true }
return false
}

function undo(col,b=board){
for(let r=0;r<R;r++)
if(b[r][col]!=0){ b[r][col]=0; return }
}

function win(b,p){
for(let r=0;r<R;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>b[r][c+i]==p))return true

for(let c=0;c<C;c++)
for(let r=0;r<R-3;r++)
if([0,1,2,3].every(i=>b[r+i][c]==p))return true

for(let r=0;r<R-3;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>b[r+i][c+i]==p))return true

for(let r=3;r<R;r++)
for(let c=0;c<C-3;c++)
if([0,1,2,3].every(i=>b[r-i][c+i]==p))return true

return false
}

function moves(b){
return [3,2,4,1,5,0,6].filter(c=>b[0][c]==0)
}

/* evaluation */
function evaluate(){
if(win(board,2)) return 10000
if(win(board,1)) return -10000

let score=0

// center preference
for(let r=0;r<R;r++)
if(board[r][3]==2) score+=3

return score
}

function search(depth,alpha,beta,max){

if(Date.now()-startTime>MAX_TIME)
return evaluate()

if(depth==0 || win(board,1) || win(board,2))
return evaluate()

let m=moves(board)

if(max){
let best=-99999

for(let c of m){
drop(c,2)
let val=search(depth-1,alpha,beta,false)
undo(c)

best=Math.max(best,val)
alpha=Math.max(alpha,val)
if(beta<=alpha) break
}

return best
}else{
let best=99999

for(let c of m){
drop(c,1)
let val=search(depth-1,alpha,beta,true)
undo(c)

best=Math.min(best,val)
beta=Math.min(beta,val)
if(beta<=alpha) break
}

return best
}
}

function bestMove(){

startTime=Date.now()

let best=-99999
let move=3

for(let depth=1;depth<=12;depth++){

let m=moves(board)

for(let c of m){

drop(c,2)
let val=search(depth,-99999,99999,false)
undo(c)

if(val>best){
best=val
move=c
}
}

if(Date.now()-startTime>MAX_TIME) break
}

return move
}

function play(c){
if(!game)return
if(!drop(c,1))return

draw()

if(win(board,1)){
setStatus("You win")
game=false
return
}

setStatus("AI thinking...")
setTimeout(aiMove,10)
}

function aiMove(){
if(!game)return

let c=bestMove()
drop(c,2)

draw()

if(win(board,2)){
setStatus("AI wins")
game=false
}else{
setStatus("Your turn")
}
}

reset()
</script>
